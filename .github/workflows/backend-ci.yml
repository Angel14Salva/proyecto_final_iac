name: Backend CI

on:
  push:
    branches: [main, develop, feature]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"
  # Sin "branches:" -- corre para PRs contra cualquier rama destino, no solo main.
  pull_request:
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: apps/backend

jobs:
  build-test:
    name: Build, test y cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: apps/backend/pom.xml

      - name: Build + tests (unitarios e integracion con Testcontainers)
        run: ./mvnw -B clean verify

      - name: Publicar reportes de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            apps/backend/target/surefire-reports/**
            apps/backend/target/site/jacoco/**
          retention-days: 7
