name: Backend CI/CD

on:
  push:
    branches: [main, develop, feature]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: apps/backend

jobs:
  build-test:
    name: Build, test y cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: apps/backend/pom.xml

      - name: Build + tests (unitarios e integracion con Testcontainers)
        run: ./mvnw -B clean verify

      - name: Publicar reportes de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            apps/backend/target/surefire-reports/**
            apps/backend/target/site/jacoco/**
          retention-days: 7

  sonar:
    name: Analisis SonarQube (opcional)
    needs: build-test
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_HOST_URL != '' }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: apps/backend/pom.xml

      - name: Build + tests + analisis Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        run: ./mvnw -B verify sonar:sonar -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN"

  docker-build-push:
    name: Build y push de imagen a ECR
    needs: build-test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/feature' && github.event_name == 'push' && vars.AWS_GHA_ROLE_ARN != '' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push de la imagen (tags = latest + SHA del commit)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: segat/backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Forzar redeploy del servicio ECS con la imagen nueva
        run: |
          aws ecs update-service \
            --cluster segat-cluster \
            --service segat-backend-service \
            --force-new-deployment \
            --no-cli-pager
