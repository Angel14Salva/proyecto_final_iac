
name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: apps/frontend

jobs:
  build-validate:
    name: Instalar dependencias y validar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Validar HTML (HTMLHint)
        run: npx --yes htmlhint "src/**/*.html"
        continue-on-error: true # no hay reglas propias configuradas todavía; no bloquea el pipeline

      - name: Compilar Sass (si existen archivos .scss)
        run: |
          if find src -name "*.scss" | grep -q .; then
            npx --yes sass src:src
          else
            echo "No hay archivos .scss que compilar, se usan los .css directamente."
          fi

  deploy-s3-cloudfront:
    name: Deploy a S3 + invalidar CloudFront
    needs: build-validate
    # Igual que el pipeline del backend: solo corre en push a main y solo si
    # el rol OIDC ya fue creado (terraform apply de github_oidc.tf) y cargado
    # como variable del repo.
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AWS_GHA_FRONTEND_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar Sass (si existen archivos .scss)
        run: |
          if find src -name "*.scss" | grep -q .; then
            npx --yes sass src:src
          else
            echo "No hay archivos .scss que compilar."
          fi

      - name: Apuntar el frontend a la API de produccion (CloudFront /api)
        run: |
          cat > src/js/config.js << EOL
          export const API_BASE_URL = 'https://${{ vars.CLOUDFRONT_DOMAIN_NAME }}/api';
          EOL

      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_FRONTEND_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sincronizar con S3 (bucket = output s3_frontend_bucket de Terraform)
        run: aws s3 sync src/ "s3://${{ vars.S3_FRONTEND_BUCKET }}" --delete

      - name: Invalidar cache de CloudFront (distribution = output cloudfront_distribution_id)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
