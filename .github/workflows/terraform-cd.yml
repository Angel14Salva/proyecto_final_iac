name: Terraform CD

# Se dispara cuando "Terraform CI" termina (workflow_run) en push -- no en PR --
# sobre feature/develop/main. En el flujo del equipo (promocion via PR
# feature->develop->main) esto equivale a "cada merge de un PR hacia esas
# ramas". GitHub lee este archivo desde la rama por defecto del repo, asi
# que el workflow_run recien queda activo despues de mergearlo ahi
# (limitacion de GitHub, no de esta config) -- igual que backend-cd.yml.
on:
  workflow_run:
    workflows: ["Terraform CI"]
    types: [completed]
    branches: [feature, develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: Entorno destino
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  resolve-environment:
    name: Resolver entorno
    runs-on: ubuntu-latest
    # "event == push" descarta los workflow_run disparados por un PR (ej. un
    # PR de feature -> develop tiene head_branch = feature, y sin este check
    # dispararia por error un apply a dev con solo abrir el PR).
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success') }}
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}
    steps:
      - name: Resolver entorno y commit a desplegar
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ inputs.environment }}"
            DEPLOY_SHA="${{ github.sha }}"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "feature" ]; then
            ENVIRONMENT="dev"
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "develop" ]; then
            ENVIRONMENT="qa"
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            ENVIRONMENT="prod"
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            echo "Rama no soportada: ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi

          echo "environment=${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"

  # Gate obligatorio: ningun hallazgo de Checkov (soft_fail=false, a
  # diferencia del job "checkov" de terraform-ci.yml que es solo informativo)
  # puede pasar a "terraform-apply". Corre sobre el entorno ya resuelto.
  checkov:
    name: Checkov (gate obligatorio antes de apply)
    runs-on: ubuntu-latest
    needs: resolve-environment
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-environment.outputs.deploy_sha }}

      - name: Checkov (hard fail)
        uses: bridgecrewio/checkov-action@v12.3113.0
        with:
          directory: infraestructure/iac/environments/${{ needs.resolve-environment.outputs.environment }}
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false

      - name: Publicar resultados en GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

  terraform-apply:
    name: Terraform plan + apply
    runs-on: ubuntu-latest
    needs: [resolve-environment, checkov]
    # Activa las variables/secrets propios del Environment (Settings >
    # Environments) que coincide con el entorno resuelto arriba.
    environment: ${{ needs.resolve-environment.outputs.environment }}
    defaults:
      run:
        working-directory: infraestructure/iac/environments/${{ needs.resolve-environment.outputs.environment }}
    env:
      AWS_REGION: us-east-1
      AWS_ROLE_ARN: ${{ vars.AWS_GHA_TERRAFORM_ROLE_ARN }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-environment.outputs.deploy_sha }}

      - name: Validar variables de despliegue
        shell: bash
        run: |
          missing=0
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "AWS_GHA_TERRAFORM_ROLE_ARN no esta configurada en el Environment '${{ needs.resolve-environment.outputs.environment }}' (Settings > Environments > ${{ needs.resolve-environment.outputs.environment }} > Variables)"
            missing=1
          fi
          if [ -z "$TF_VAR_db_password" ]; then
            echo "DB_PASSWORD no esta configurado en el Environment '${{ needs.resolve-environment.outputs.environment }}' (Settings > Environments > ${{ needs.resolve-environment.outputs.environment }} > Secrets)"
            missing=1
          fi
          exit "$missing"

      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"

      - name: terraform init
        run: terraform init -input=false

      - name: terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: terraform apply
        run: terraform apply -input=false -auto-approve tfplan
