# =============================================================================
# docker-compose.yml — Entorno de desarrollo local SEGAT
# =============================================================================
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: segat-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reportes_db
      SPRING_DATASOURCE_USERNAME: dev_user
      SPRING_DATASOURCE_PASSWORD: dev_pass
      APP_ENV: development
      # Tiene que ser Base64 valido: JwtService lo decodifica con Decoders.BASE64
      # para construir la llave HMAC (un string con guiones como este rompia con
      # "Illegal base64 character: '-'" en cuanto se generaba el primer token)
      JWT_SECRET: re2vKy49qPoLKPWe9n6+ZMYgA0dyiGiw4Rdk5zAfWnw=
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      # Valores dummy: Cloudinary/n8n no funcionan de verdad en local salvo que se sobreescriban con credenciales reales
      CLOUDINARY_CLOUD_NAME: dev-placeholder
      CLOUDINARY_API_KEY: dev-placeholder
      CLOUDINARY_API_SECRET: dev-placeholder
      N8N_NEW_REPORT: http://localhost:5678/webhook/new-report
      N8N_NEW_TASK: http://localhost:5678/webhook/new-task
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  postgres:
    image: postgis/postgis:15-3.3
    container_name: segat-db
    environment:
      POSTGRES_DB: reportes_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d reportes_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
