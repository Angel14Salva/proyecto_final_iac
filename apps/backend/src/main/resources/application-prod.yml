application:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION} # en milisegundos (ejemplo: 86400000 = 1 día)
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION} # en milisegundos (ejemplo: 604800000 = 7 días)

spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: false
        globally_quoted_identifiers: false
  servlet:
    multipart:
      max-file-size: 5MB      # Límite por archivo
      max-request-size: 10MB  # Límite total por petición
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

mail:
    from: ${MAIL_FROM}

# El actuator viene con un chequeo automatico que intenta conectarse de
# verdad al servidor SMTP en cada /actuator/health -- si Gmail no responde
# rapido (o el egress no lo permite), el health check completo se cuelga
# ~130s y el ALB/Docker lo marcan como caido, aunque la app este sana.
# El envio de correos es una funcionalidad secundaria (notificaciones),
# no debe poder tumbar el health check del servicio entero.
management:
  health:
    mail:
      enabled: false

aws:
  region: ${AWS_REGION:us-east-1}
  sqs:
    reportes-queue-url: ${SQS_REPORTES_URL}
    notificaciones-queue-url: ${SQS_NOTIFICACIONES_URL}
  sns:
    negocio-topic-arn: ${SNS_NEGOCIO_ARN}
  dynamodb:
    gps-table: ${DYNAMODB_GPS_TABLE}
    notifications-table: ${DYNAMODB_NOTIFICATIONS_TABLE}

