<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — Trujillo Informado</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">
    <div class="login-shell" style="grid-template-columns: 1fr;">
        <div class="login-form-area">
            <h1>Crear cuenta de ciudadano</h1>
            <p class="subtitle">Para reportar incidencias en tu zona. Los usuarios trabajador/supervisor los crea el equipo municipal.</p>
            <p id="error-message" class="error-message"></p>
            <form id="register-form">
                <div class="row" style="gap:.75rem;">
                    <div class="field" style="flex:1;">
                        <label for="firstname">Nombres</label>
                        <input type="text" id="firstname" name="firstname" required>
                    </div>
                    <div class="field" style="flex:1;">
                        <label for="lastname">Apellidos</label>
                        <input type="text" id="lastname" name="lastname" required>
                    </div>
                </div>
                <div class="field">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" autocomplete="username" required>
                </div>
                <div class="row" style="gap:.75rem;">
                    <div class="field" style="flex:1;">
                        <label for="phone">Celular</label>
                        <input type="text" id="phone" name="phone" required>
                    </div>
                    <div class="field" style="flex:1;">
                        <label for="birthdate">Fecha de nacimiento</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>
                </div>
                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="register-submit">Crear cuenta</button>
            </form>
            <p class="login-footer-link">¿Ya tienes cuenta? <a href="../index.html">Inicia sesión</a></p>
        </div>
    </div>
    <script type="module" src="../js/pages/registro.js"></script>
</body>
</html>
