server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "compose_service"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "logstream"
    pipeline_stages:
      # Los logs del backend salen en JSON (logging.structured.format.console=ecs,
      # ver Fase 1). Si el log parsea como JSON, promovemos log.level como label
      # "level" para poder filtrar por severidad en Grafana; si no es JSON
      # (ej. Postgres, Sonar) el stage simplemente no matchea nada y sigue de largo.
      - json:
          expressions:
            level: log.level
      - labels:
          level:
